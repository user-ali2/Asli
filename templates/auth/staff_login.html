<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login</title>
</head>
<style>
    body{
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .login-box{
        width: 40%;
        padding: 30px;
        background-color: white;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .login-box h2{
        text-align: center;
        margin-bottom: 20px;
    }

    .login-box input{
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 6px;
    }

    .login-box button{
        width: 100%;
        padding: 12px;
        background: #2c3e50;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
    }

    .login-box button:hover{
        background: #1a252f;
    }

    .error{
        color: red;
        text-align: center;
        margin-bottom: 10px;

    }

    .note{
        font-size: 12px;
        text-align: center;
        color: gray;
        margin-bottom: 10px;
    }

</style>
<body>
    <div class="login-box">
        <h2>Staff Login</h2>
        {% if messages %}
            {% for message in messages %}
                <p class="error">{{ message }}</p>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>
        </form>

        <p class="note">Only authorized Staff can access this system</p>
    </div>
</body>
</html>
